server {
    listen 80;
    server_name localhost;

    # Allow up to 105MB for MP4s (Spring Boot will enforce specific sizes per file type)
    client_max_body_size 105M; 

    # Serve media rapidly without touching Spring Boot
    location /media/ {
        alias /var/www/uploads/; # Maps to Windows folder via Docker Volume
        mp4;                     # Crucial: Enable MP4 streaming support
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        expires 30d;             # Tell browsers to cache images/PDFs
    }

    # Proxy to Spring Boot API
    location /api/ {
        proxy_pass http://host.docker.internal:8123/api/; # 'host.docker.internal' points to your Windows laptop
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
